---
layout: default
---
<h1>{{ page.title }}</h1>
<p class="meta">{{ page.date | date_to_string }}</p>
{% if page.book_author %}
<p class="book-meta">
  <strong>Author:</strong> {{ page.book_author }}
  {% if page.year_published %} | <strong>Published:</strong> {{ page.year_published }}{% endif %}
</p>
{% endif %}

<div class="post">
  {{ content }}
</div>
